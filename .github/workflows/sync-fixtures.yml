name: Sync WC26 fixtures

on:
  schedule:
    # Staggered minutes — GitHub often skips */5 at :00/:30
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-fixtures
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch fixtures from odds-api.io
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "$ODDS_API_KEY" ]; then
            echo "::error::ODDS_API_KEY secret is not set"
            exit 1
          fi
          python scripts/fetch_fixtures.py

      - name: Publish docs/fixtures.js and fixtures.json
        run: python scripts/publish_fixtures.py

      - name: Settle finished bets (optional)
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Skipping settlement — FIREBASE_SERVICE_ACCOUNT secret not set"
            exit 0
          fi
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          pip install firebase-admin
          python scripts/settle_bets.py

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.js docs/fixtures.json data/wc26_finished_archive.json
          if git diff --staged --quiet; then
            echo "No fixture changes to commit."
          else
            git commit -m "Sync WC26 fixtures and scores from odds-api.io"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi

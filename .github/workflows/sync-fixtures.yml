name: Sync WC26 fixtures

on:
  schedule:
    # Every 30 minutes during tournament — adjust as needed
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv

      - name: Fetch fixtures from odds-api.io
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_fixtures.py

      - name: Publish docs/fixtures.js
        run: python scripts/publish_fixtures.py

      - name: Settle finished bets (optional)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
            pip install firebase-admin
            python scripts/settle_bets.py
          else
            echo "Skipping settlement — FIREBASE_SERVICE_ACCOUNT secret not set"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.js
          git diff --staged --quiet || git commit -m "Sync WC26 fixtures and scores from odds-api.io"
          git push
